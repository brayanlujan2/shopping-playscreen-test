serenity {
    project.name= "Shopping Cart Mobile Tests"
    take.screenshots = AFTER_EACH_STEP
    report.encoding = "UTF-8"
}

webdriver {
    driver = appium
    autodownload = false
}

appium {
    hub = "http://127.0.0.1:4723"
    platformName = "Android"
    automationName = "UiAutomator2"
    deviceName = "emulator-5554"
    appPackage = "edu.pe.cibertec.shooping_cart_appium_demo"
    appActivity = "edu.pe.cibertec.shooping_cart_appium_demo.MainActivity"
    noReset = true
    newCommandTimeout = 120
}

environments {
    default {
        webdriver.base.url = ""
    }
}